<!doctype html>
<html>
    <head>
        <meta charset="uft-8">
        <title>My First Game!</title>
        <style>
            body {
                text-align: center;
            }

            canvas {
                border: 1px solid black;
            }
        </style>
        <script>
            // Canvas e Contexto
            var canvas, ctx;
          
            function rectangle(xPos, yPos, xSpeed, ySpeed, color) {
                this.height = 60;
                this.width = 60;
                this.xPos = xPos;
                this.yPos = yPos;
                this.xSpeed = xSpeed;
                this.ySpeed = ySpeed;
                this.color = color;

                this.collisionBorder = function() {
                    if ((this.xPos + this.width >= canvas.width) || (this.xPos <= 5)) {
                        this.xSpeed = - this.xSpeed;                
                    } else if ((this.yPos + this.height >= canvas.height) || (this.yPos <= 5)) {
                        this.ySpeed = - this.ySpeed;           
                    }
                }

                this.draw = function() {
                    ctx.save();
                    ctx.translate(this.xPos, this.yPos);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = 0.7;
                    ctx.fillRect(0, 0, this.width, this.height);
                    ctx.globalAlpha = 1;
                    ctx.lineWidth = 5;
                    ctx.strokeStyle = 'rgba(0, 0, 0, 1)';
                    ctx.strokeRect(0, 0, this.width, this.width);
                    this.xPos += this.xSpeed;
                    this.yPos += this.ySpeed;
                    this.collisionBorder();
                    ctx.restore();
                }
            }
          
            // Posições Iniciais
            var rectOne = new rectangle(10, 10, 2 + Math.random()*3, 2 + Math.random()*3, 'red');
            var rectTwo = new rectangle(300, 200, 2 + Math.random() * 3, 2 + Math.random() * 3, 'green');
            var rectThree = new rectangle(300, 10, 2 + Math.random() * 3, 2 + Math.random() * 3, 'blue');
            var rectFour = new rectangle(10, 300, 2 + Math.random() * 3, 2 + Math.random() * 3, 'yellow');
            var rectFive = new rectangle(100, 200, 2 + Math.random() * 3, 2 + Math.random() * 3, 'gray');

            var rects = [rectOne, rectTwo, rectThree, rectFour, rectFive];

            // Mouse
            var cursor = {
                x : 300,
                y : 200,
                toCenterX: 6,
                toCenterY: 5,
                width: 10,
                height: 10
            }

            var write = false;
            var message;



            function init() {
                canvas = document.getElementById('myCanvas');
                ctx = canvas.getContext('2d');

                canvas.addEventListener('mousemove', function (evt) {
                    mousePos = getMousePos(canvas, evt);
                    cursor.x = mousePos.x - cursor.toCenterX;
                    cursor.y = mousePos.y - cursor.toCenterY;
                }, false);

                canvas.addEventListener('mousedown', function (evt) {
                    write = false;
                }, false);

                requestAnimationFrame(animate);
            }

            function animate() {
                // clear
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // draw
                drawRectangles();
                drawMouse();

                // detect collisions
                detectAllCollisions(rects);
                borderCollision(cursor.x, cursor.y, cursor.width, cursor.height);
                mouseSquareAllCollisions(rects);

                writeMessage(message, write);

                // repeat
                requestAnimationFrame(animate);
            }

            function drawMouse() {
                ctx.save();
                ctx.fillStyle = 'black';
                ctx.fillRect(cursor.x, cursor.y, cursor.width, cursor.height);
                ctx.restore();
            }

            function mouseSquareAllCollisions(arrayOfRects) {
                for (var i = 0; i < arrayOfRects.length; i++) {
                    mouseSquareCollisionX(arrayOfRects[i]);
                    mouseSquareCollisionY(arrayOfRects[i]);
                }
            }

            function mouseSquareCollisionX(rect) {

                var distX1 = Math.abs(cursor.x + cursor.width - rect.xPos);
                var distX2 = Math.abs(rect.xPos + rect.width - cursor.x);
                var distY1 = cursor.y - rect.yPos;

                if (((distX1 <= 3) || (distX2 <= 3)) && ((distY1 <= rect.height) && (distY1 >= -cursor.height))) {
                    message = 'You lose! =/';
                    write = true;
                }
            }

            function mouseSquareCollisionY(rect) {

                var distY1 = Math.abs(cursor.y + cursor.height - rect.yPos);
                var distY2 = Math.abs(rect.yPos + rect.height - cursor.y);
                var distX1 = cursor.x - rect.xPos;

                if (((distY1 <= 3) || (distY2 <= 3)) && ((distX1 <= rect.width) && (distX1 >= -cursor.width))) {
                    message = 'You lose! =/';
                    write = true;
                }
            }

            function borderCollision(x, y, width, height) {
                if ((x + width >= canvas.width) || (x <= 0)) {
                    message = 'You lose! =/';
                    write = true;
                }
                if ((y + height >= canvas.height) || (y <= 0)) {
                    message = 'You lose! =/';
                    write = true;
                }
            }

            function getMousePos(canvas, evt) {
                // necessary to take into account CSS boudaries
                var rect = canvas.getBoundingClientRect();
                return {
                    x: evt.clientX - rect.left,
                    y: evt.clientY - rect.top
                };
            }

            function writeMessage(message, write) {
                if (write) {
                    ctx.save();
                    ctx.font = '18pt Calibri';
                    ctx.fillStyle = 'black';
                    ctx.fillText(message, 10, 25);
                    ctx.restore();
                }   
            }

            function drawRectangles() {
                for (var i = 0; i < rects.length; i++) {
                    rects[i].draw();
                }
            }

            function detectAllCollisions(arrayOfRects) {
                for (var i = 0; i < arrayOfRects.length; i++) {
                    for (var j = 0; j < i; j++) {
                        detectBothCollisions(arrayOfRects[j], arrayOfRects[i]);
                    }
                }
            }

            function detectBothCollisions(rect1, rect2) {
                detectSimulCollisionsX(rect1, rect2);
                detectSimulCollisionsY(rect1, rect2);
            }
          
            function detectSimulCollisionsX(rect1, rect2) {
                var distX1 = Math.abs(rect1.xPos + rect1.width - rect2.xPos);
                var distX2 = Math.abs(rect2.xPos + rect2.width - rect1.xPos);
                var distY = Math.abs(rect1.yPos - rect2.yPos);
                if (((distX1 <= 8) || (distX2 <= 8)) && (distY <= rect1.width)) {
                    var tmp = rect1.xSpeed;
                    rect1.xSpeed = rect2.xSpeed;
                    rect2.xSpeed = tmp;
                }
            }

            function detectSimulCollisionsY(rect1, rect2) {
                var distY1 = Math.abs(rect1.yPos + rect1.height - rect2.yPos);
                var distY2 = Math.abs(rect2.yPos + rect2.height - rect1.yPos);
                var distX = Math.abs(rect1.xPos - rect2.xPos);
                if (((distY1 <= 8) || (distY2 <= 8)) && (distX <= rect1.height)) {
                    var tmp = rect1.ySpeed;
                    rect1.ySpeed = rect2.ySpeed;
                    rect2.ySpeed = tmp;
                }
            }
        </script>
    </head>
    <body onload="init()">
        <h1>My First Game!</h1>
        <canvas id="myCanvas" width="600" height="400"> Your browser does not support the canvas element </canvas>
        <p>Click para reiniciar</p>
    </body>
</html>
