<!doctype html>

<html>
<head>
	<meta charset="uft-8">
	<title>Week Four - Part II</title>
	<style>
		body {
			text-align: center;
		}
		#myCanvas {
			border: 1px solid black;
		}
	</style>
	<script>
		// global variables
		var canvas, ctx;
        var rectX = 10, rectY = 10;
        var incrementX = 0, incrementY = 0;
   		var initX = 0, initY = 0;

		function init() {
			// Get context;
			canvas = document.getElementById('myCanvas');
			ctx = canvas.getContext('2d');

            // Add listener
            window.addEventListener('keydown', handleKeyDown, false);
            window.addEventListener('keyup', handleKeyUp, false);
            
            // Call the loop;
            requestId = requestAnimationFrame(drawRect);
		}
      
        function handleKeyDown(evt) {
            if (evt.keyCode === 37) {
                incrementX = -2;
            } else if (evt.keyCode === 38) {
                incrementY = -2;
            } else if (evt.keyCode === 39) {
                incrementX = 2;
            } else if (evt.keyCode === 40) {
                incrementY = 2;
            }
        }
      
        function handleKeyUp(evt) {
            if ((evt.keyCode === 37) || (evt.keyCode === 39)) {
                incrementX = 0;
            } else if ((evt.keyCode === 38) || (evt.keyCode === 40)) {
                incrementY = 0;
            }
        }
      
        function drawRect() {
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(rectX, rectY);
            ctx.fillRect(initX, initY, 30, 30);
            ctx.restore();
          
            rectX += incrementX;
            rectY += incrementY;
          
            requestId = requestAnimationFrame(drawRect);
        }
	</script>
</head>
<body onload="init()">
	<h1>Week Four - Part II</h1>
	<canvas id="myCanvas" width="600" height="400">Your browser does not support the canvas element</canvas>
</body>
</html>
