<!doctype html>

<html>
<head>
	<meta charset="uft-8">
	<title>Week Four - Part II</title>
	<style>
		body {
			text-align: center;
		}
		#myCanvas {
			border: 1px solid black;
		}
	</style>
	<script>
		// global variables
		var canvas, ctx;
        var rectX = 10, rectY = 10;

		function init() {
			// Get context;
			canvas = document.getElementById('myCanvas');
			ctx = canvas.getContext('2d');

            // Add listener
            window.addEventListener('keydown', handleKeyDown, false);
          
            // Draw first frame
            drawRect();
		}
      
        function handleKeyDown(evt) {
            if (evt.keyCode === 37) {
                rectX -= 2;
            } else if (evt.keyCode === 38) {
                rectY -= 2;
            } else if (evt.keyCode === 39) {
                rectX += 2;
            } else if (evt.keyCode === 40) {
                rectY += 2;
            }
            drawRect();
        }
      
        function drawRect() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.fillRect(rectX, rectY, 30, 30);
            ctx.restore();
        }
	</script>
</head>
<body onload="init()">
	<h1>Week Four - Part II</h1>
	<canvas id="myCanvas" width="600" height="400">Your browser does not support the canvas element</canvas>
</body>
</html>
